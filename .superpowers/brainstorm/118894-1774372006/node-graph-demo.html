<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DevBrain — Node Graph Demo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: #0a0c10;
  display: flex; justify-content: center; align-items: flex-start;
  min-height: 100vh; padding: 20px 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.phone {
  width: 340px; height: 720px;
  background: #0d0f14; border-radius: 44px;
  border: 2px solid #2c313a;
  box-shadow: 0 0 0 1px #1a1e28, 0 30px 80px rgba(0,0,0,0.8);
  overflow: hidden; position: relative; display: flex; flex-direction: column;
}
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
}
.screen.hidden      { transform: translateX(100%); opacity: 0; pointer-events: none; }
.screen.hidden-left { transform: translateX(-30%); opacity: 0; pointer-events: none; }

/* BOTTOM NAV */
.bnav {
  display: flex; justify-content: space-around; align-items: center;
  border-top: 1px solid #1a1e28; padding: 10px 0 14px;
  background: rgba(13,15,20,0.96); backdrop-filter: blur(16px);
  flex-shrink: 0; z-index: 10;
}
.ni {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  font-size: 9px; color: #3e4451; cursor: pointer;
  padding: 5px 14px; border-radius: 10px;
  transition: color 0.15s, background 0.15s; user-select: none;
}
.ni.active { color: #61afef; background: rgba(97,175,239,0.1); }
.ni svg { display: block; }

/* ─── WORLD MAP ─── */
#screen-map { background: #060810; }
.map-header {
  padding: 18px 16px 12px;
  background: linear-gradient(to bottom, rgba(6,8,16,0.95), transparent);
  position: relative; z-index: 5; flex-shrink: 0;
}
.map-title { font-size: 16px; font-weight: 700; color: #e5e9f0; }
.map-sub   { font-size: 10px; color: #4b5263; margin-top: 2px; }
.world-canvas {
  flex: 1; position: relative;
  overflow-y: auto; overflow-x: hidden; scrollbar-width: none;
  padding: 4px 12px 12px;
}
.world-canvas::-webkit-scrollbar { display: none; }
.star-field { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
.st {
  position: absolute; background: #fff; border-radius: 50%;
  animation: twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);
}
@keyframes twinkle {
  0%,100% { opacity: var(--min-op, 0.15); }
  50%     { opacity: var(--max-op, 0.5); }
}
.zone-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  position: relative; z-index: 2;
}
.zone-card {
  background: #111620; border: 1px solid #1a1e28; border-radius: 16px;
  padding: 12px; cursor: pointer; transition: border-color 0.2s, transform 0.15s;
  user-select: none; position: relative; overflow: hidden;
}
.zone-card:active { transform: scale(0.96); }
.zc-glow {
  position: absolute; top: -20px; right: -20px;
  width: 80px; height: 80px; border-radius: 50%;
  pointer-events: none; opacity: 0.15; filter: blur(20px);
}
.zc-name { font-size: 11px; font-weight: 700; margin-bottom: 8px; }
.zc-preview {
  height: 50px; background: rgba(0,0,0,0.3); border-radius: 8px;
  position: relative; overflow: hidden; margin-bottom: 7px;
}
.mn { position: absolute; border-radius: 50%; }
.zc-footer { display: flex; align-items: center; justify-content: space-between; }
.zc-count  { font-size: 9px; color: #4b5263; }
.zc-bar-wrap { width: 60px; height: 2px; background: #1a1e28; border-radius: 1px; overflow: hidden; }
.zc-bar { height: 100%; border-radius: 1px; }

/* ─── ZONE INNER MAP ─── */
#screen-zone { background: #04060c; position: relative; }
.zone-header {
  padding: 14px 16px 10px;
  background: linear-gradient(to bottom, rgba(4,6,12,0.98) 60%, transparent);
  position: absolute; top: 0; left: 0; right: 0; z-index: 20;
  display: flex; align-items: center; justify-content: space-between;
}
.zh-back {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: #4b5263; cursor: pointer; padding: 5px 0;
}
.zh-center { text-align: center; flex: 1; }
.zh-title  { font-size: 13px; font-weight: 700; }
.zh-prog   { font-size: 9px; color: #4b5263; margin-top: 1px; }
.node-canvas { flex: 1; position: relative; overflow: hidden; }
.map-legend {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 6px 14px; display: flex; gap: 12px; flex-wrap: wrap;
  background: linear-gradient(to top, rgba(4,6,12,0.9) 60%, transparent);
  z-index: 15; pointer-events: none;
}
.lg-item { display: flex; align-items: center; gap: 4px; font-size: 8px; color: #3e4451; }
.lg-dot     { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.lg-diamond { width: 7px; height: 7px; transform: rotate(45deg); border: 1.5px solid; flex-shrink: 0; }
#edges-svg  { position: absolute; inset: 0; pointer-events: none; z-index: 1; overflow: visible; }

/* NODES */
.node {
  position: absolute; transform: translate(-50%,-50%);
  cursor: pointer; z-index: 5;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
}
.node:active .node-circle { transform: scale(0.88); }
.node-circle {
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s, box-shadow 0.3s; position: relative;
}
.node-label {
  position: absolute; top: calc(100% + 5px);
  left: 50%; transform: translateX(-50%);
  white-space: nowrap; font-size: 8px; font-weight: 500;
  color: #636d83; pointer-events: none; text-align: center;
  max-width: 60px; overflow: hidden; text-overflow: ellipsis;
}
.node.done   .node-circle { background: var(--zc); box-shadow: 0 0 8px var(--glow), 0 0 20px var(--glow2); animation: nGlow 3s ease-in-out infinite; }
.node.review .node-circle { background: transparent; border: 2px solid var(--zc); box-shadow: 0 0 5px var(--glow2); animation: nReview 2.5s ease-in-out infinite; }
.node.new    .node-circle { background: transparent; border: 2px solid rgba(97,175,239,0.45); }
.node.locked .node-circle { background: #1a1e28; border: 1px solid #2c313a; }
.node.locked .node-label  { color: #2c313a; }
@keyframes nGlow   { 0%,100%{box-shadow:0 0 8px var(--glow),0 0 20px var(--glow2)} 50%{box-shadow:0 0 14px var(--glow),0 0 34px var(--glow2)} }
@keyframes nReview { 0%,100%{opacity:0.75;box-shadow:0 0 5px var(--glow2)} 50%{opacity:1;box-shadow:0 0 10px var(--glow2)} }

/* BRIDGE NODES */
.node.bridge .node-circle {
  border-radius: 0 !important; transform: rotate(45deg) !important;
  background: #04060c !important; border: none !important;
  box-shadow: none !important; animation: none !important;
}
.node.bridge .node-circle::before {
  content: ''; position: absolute; inset: -1.5px; border-radius: 2px;
  background: var(--bridge-grad); z-index: -1;
}
.node.bridge.done .node-circle { animation: bGlow 3s ease-in-out infinite !important; }
@keyframes bGlow { 0%,100%{filter:drop-shadow(0 0 4px var(--glow))} 50%{filter:drop-shadow(0 0 10px var(--glow))} }

.subcat-label {
  position: absolute; font-size: 7px; color: #252932;
  text-transform: uppercase; letter-spacing: 0.1em;
  pointer-events: none; z-index: 3; font-weight: 600;
}

/* ─── BOTTOM SHEET ─── */
.sheet-backdrop {
  position: absolute; inset: 0; background: rgba(0,0,0,0);
  z-index: 30; pointer-events: none; transition: background 0.3s;
}
.sheet-backdrop.visible { background: rgba(0,0,0,0.55); pointer-events: all; }
.bottom-sheet {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: #131720; border: 1px solid #2c313a; border-bottom: none;
  border-radius: 20px 20px 0 0; padding: 0 16px 20px;
  z-index: 40; transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
}
.bottom-sheet.visible { transform: translateY(0); }
.sheet-handle { width: 36px; height: 3px; background: #3e4451; border-radius: 2px; margin: 10px auto 14px; }
.sheet-concept { font-size: 15px; font-weight: 700; color: #e5e9f0; }
.sheet-zone    { font-size: 10px; color: #4b5263; margin-top: 2px; margin-bottom: 12px; }
.sheet-types   { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.sheet-type {
  display: flex; align-items: center; gap: 10px;
  background: #0d0f14; border: 1px solid #1a1e28; border-radius: 10px;
  padding: 9px 11px; cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.sheet-type.sel { border-color: rgba(97,175,239,0.4); background: rgba(97,175,239,0.06); }
.sheet-type.dim { opacity: 0.38; pointer-events: none; }
.st-icon {
  width: 26px; height: 26px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; flex-shrink: 0; font-weight: 700;
}
.st-info { flex: 1; }
.st-name { font-size: 11px; color: #abb2bf; font-weight: 600; }
.st-desc { font-size: 9px; color: #4b5263; margin-top: 1px; }
.st-tier { font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: 600; flex-shrink: 0; }
.t1 { background: rgba(97,175,239,0.12);  color: #61afef; }
.t2 { background: rgba(229,192,123,0.12); color: #e5c07b; }
.t3 { background: rgba(152,195,121,0.12); color: #98c379; }
.tl { background: #1a1e28; color: #3e4451; }
.sheet-start {
  background: rgba(97,175,239,0.15); border: 1px solid rgba(97,175,239,0.35);
  border-radius: 11px; padding: 11px; text-align: center;
  font-size: 13px; font-weight: 700; color: #61afef;
  cursor: pointer; transition: background 0.15s;
}
.sheet-start:active { background: rgba(97,175,239,0.25); }
</style>
</head>

// ─── UTILITIES ───────────────────────────────────────────
function hexRgb(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}
function el(tag, cls, style) {
  const e = document.createElement(tag);
  if (cls)   e.className = cls;
  if (style) e.style.cssText = style;
  return e;
}

// ─── STARS ───────────────────────────────────────────────
function makeStars(parent, count, maxTopPx) {
  for (let i = 0; i < count; i++) {
    const s = el('div', 'st');
    const sz = Math.random() < 0.7 ? 1 : 1.5;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${(Math.random()*100).toFixed(1)}%;top:${(Math.random()*maxTopPx).toFixed(0)}px;--d:${(2+Math.random()*3).toFixed(1)}s;--delay:-${(Math.random()*5).toFixed(1)}s;--min-op:${(0.08+Math.random()*0.15).toFixed(2)};--max-op:${(0.3+Math.random()*0.35).toFixed(2)};`;
    parent.appendChild(s);
  }
}

// ─── WORLD MAP BUILD ─────────────────────────────────────
function buildWorld() {
  makeStars(document.getElementById('star-field'), 60, 600);
  const grid = document.getElementById('zone-grid');

  ZONES.forEach(z => {
    const pct = z.explored / z.total;
    const card = el('div', 'zone-card');
    card.style.borderColor = z.explored > 0
      ? `rgba(${hexRgb(z.color).join(',')},0.3)` : '#1a1e28';

    // glow blob
    const glow = el('div','zc-glow');
    glow.style.background = z.color;
    card.appendChild(glow);

    // name
    const name = el('div','zc-name');
    name.style.color = z.color;
    name.textContent = z.name;
    card.appendChild(name);

    // preview
    const prev = el('div','zc-preview');
    z.nodes.filter(n => n.s==='done'||n.s==='review').slice(0,6).forEach(n => {
      const dot = el('div','mn');
      const sz = n.s==='done'?6:4;
      dot.style.cssText = `width:${sz}px;height:${sz}px;background:${z.color};left:${(n.x*100).toFixed(0)}%;top:${(n.y*50).toFixed(0)}%;opacity:${n.s==='done'?0.9:0.4};${n.s==='done'?'box-shadow:0 0 5px '+z.color+';':''}`;
      prev.appendChild(dot);
    });
    card.appendChild(prev);

    // footer
    const foot = el('div','zc-footer');
    const cnt  = el('span','zc-count');
    cnt.textContent = z.explored > 0 ? z.explored + ' explored' : 'Not started';
    const barWrap = el('div','zc-bar-wrap');
    const bar = el('div','zc-bar');
    bar.style.cssText = `width:${(pct*100).toFixed(0)}%;background:${z.color}`;
    barWrap.appendChild(bar);
    foot.appendChild(cnt);
    foot.appendChild(barWrap);
    card.appendChild(foot);

    card.addEventListener('click', () => openZone(z));
    grid.appendChild(card);
  });
}

// ─── ZONE INNER MAP ──────────────────────────────────────
function openZone(z) {
  const titleEl = document.getElementById('zh-title');
  titleEl.textContent = z.name;
  titleEl.style.color = z.color;
  document.getElementById('zh-prog').textContent = `${z.explored} / ${z.total} explored`;
  buildGraph(z);
  document.getElementById('screen-map').classList.add('hidden-left');
  document.getElementById('screen-zone').classList.remove('hidden');
}

function closeZone() {
  document.getElementById('screen-map').classList.remove('hidden-left');
  document.getElementById('screen-zone').classList.add('hidden');
  closeSheet();
}

function buildGraph(z) {
  const canvas = document.getElementById('node-canvas');
  const svg    = document.getElementById('edges-svg');

  // clear old nodes/stars (keep svg)
  Array.from(canvas.children).forEach(c => { if (c !== svg) canvas.removeChild(c); });
  svg.innerHTML = '';

  const W = canvas.offsetWidth  || 316;
  const H = canvas.offsetHeight || 440;

  // stars
  makeStars(canvas, 40, H);

  // defs for gradient edges
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  svg.appendChild(defs);

  // subcategory cluster labels
  const centers = z.subcats.map(()=>({x:0,y:0,n:0}));
  z.nodes.forEach(n=>{ centers[n.sc].x+=n.x; centers[n.sc].y+=n.y; centers[n.sc].n++; });
  z.subcats.forEach((name,i)=>{
    if(!centers[i].n) return;
    const lbl = el('div','subcat-label');
    lbl.textContent = name;
    lbl.style.left = ((centers[i].x/centers[i].n)*W)+'px';
    lbl.style.top  = ((centers[i].y/centers[i].n)*H - 16)+'px';
    lbl.style.transform = 'translateX(-50%)';
    canvas.appendChild(lbl);
  });

  // build id→node map
  const nm = {};
  z.nodes.forEach(n=>{ nm[n.id]=n; });

  // draw edges
  z.edges.forEach(([a,b])=>{
    const na=nm[a], nb=nm[b]; if(!na||!nb) return;
    const x1=na.x*W, y1=na.y*H, x2=nb.x*W, y2=nb.y*H;
    const isBridge = na.bridge||nb.bridge;
    let stroke, sop;
    if(isBridge){
      const bn = na.bridge ? na : nb;
      const gid = `g-${bn.id}-${a}-${b}`;
      const grad = document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
      grad.id=gid; grad.setAttribute('gradientUnits','userSpaceOnUse');
      grad.setAttribute('x1',x1);grad.setAttribute('y1',y1);
      grad.setAttribute('x2',x2);grad.setAttribute('y2',y2);
      const c1=ZONES.find(z2=>z2.id===bn.bz[0])?.color||z.color;
      const c2=ZONES.find(z2=>z2.id===bn.bz[1])?.color||'#61afef';
      const s1=document.createElementNS('http://www.w3.org/2000/svg','stop');
      s1.setAttribute('offset','0%'); s1.setAttribute('stop-color',c1);
      const s2=document.createElementNS('http://www.w3.org/2000/svg','stop');
      s2.setAttribute('offset','100%'); s2.setAttribute('stop-color',c2);
      grad.appendChild(s1); grad.appendChild(s2); defs.appendChild(grad);
      stroke=`url(#${gid})`; sop='0.5';
    } else {
      stroke=z.color;
      sop = (na.s==='done'&&nb.s==='done')?'0.35':(na.s==='locked'&&nb.s==='locked')?'0.08':'0.18';
    }
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1);line.setAttribute('y1',y1);
    line.setAttribute('x2',x2);line.setAttribute('y2',y2);
    line.setAttribute('stroke',stroke);
    line.setAttribute('stroke-width','1');
    line.setAttribute('stroke-opacity',sop);
    svg.appendChild(line);
  });

  // draw nodes
  z.nodes.forEach(n=>{
    const wrap = el('div', `node ${n.s}${n.bridge?' bridge':''}`);
    wrap.style.left = (n.x*W)+'px';
    wrap.style.top  = (n.y*H)+'px';

    if(n.bridge){
      const c1=ZONES.find(z2=>z2.id===n.bz[0])?.color||z.color;
      const c2=ZONES.find(z2=>z2.id===n.bz[1])?.color||'#61afef';
      wrap.style.setProperty('--bridge-grad',`linear-gradient(135deg,${c1},${c2})`);
      wrap.style.setProperty('--glow',c1);
    } else {
      wrap.style.setProperty('--zc',z.color);
      wrap.style.setProperty('--glow',z.glow);
      wrap.style.setProperty('--glow2',z.glow2);
    }

    const circle = el('div','node-circle');
    circle.style.width  = n.sz+'px';
    circle.style.height = n.sz+'px';

    const lbl = el('div','node-label');
    lbl.textContent = n.name;

    wrap.appendChild(circle);
    wrap.appendChild(lbl);

    if(n.s !== 'locked'){
      wrap.addEventListener('click', e=>{ e.stopPropagation(); openSheet(n,z); });
    }
    canvas.appendChild(wrap);
  });
}

// ─── BOTTOM SHEET ────────────────────────────────────────
let selType = 'def';

function openSheet(n, z) {
  document.getElementById('sheet-concept').textContent = n.name;
  document.getElementById('sheet-zone-lbl').textContent = `${z.name} · ${z.subcats[n.sc]}`;

  const tierMax = n.s==='done'?3 : n.s==='review'?2 : 1;
  selType = 'def';
  const container = document.getElementById('sheet-types');
  while(container.firstChild) container.removeChild(container.firstChild);

  QTYPES.forEach(qt=>{
    const locked = qt.tier > tierMax;
    const row = el('div', `sheet-type${qt.id===selType?' sel':''}${locked?' dim':''}`);

    const icon = el('div','st-icon');
    icon.style.background = qt.bg;
    icon.style.color = qt.fg;
    icon.textContent = qt.icon;

    const info = el('div','st-info');
    const nm2 = el('div','st-name'); nm2.textContent = qt.name;
    const desc = el('div','st-desc'); desc.textContent = qt.desc;
    info.appendChild(nm2); info.appendChild(desc);

    const tier = el('span',`st-tier ${locked?'tl':qt.tc}`);
    tier.textContent = 'Tier '+qt.tier;

    row.appendChild(icon); row.appendChild(info); row.appendChild(tier);

    if(!locked){
      row.addEventListener('click',()=>{
        container.querySelectorAll('.sheet-type').forEach(e=>e.classList.remove('sel'));
        row.classList.add('sel');
        selType = qt.id;
      });
    }
    container.appendChild(row);
  });

  document.getElementById('sheet-backdrop').classList.add('visible');
  document.getElementById('bottom-sheet').classList.add('visible');
}

function closeSheet(){
  document.getElementById('sheet-backdrop').classList.remove('visible');
  document.getElementById('bottom-sheet').classList.remove('visible');
}

// ─── STUB TAB MSG ────────────────────────────────────────
function tabMsg(name){
  const t = el('div');
  t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1e28;color:#636d83;font-size:10px;padding:6px 14px;border-radius:20px;pointer-events:none;z-index:999;border:1px solid #2c313a;white-space:nowrap';
  t.textContent = name+' tab — demo only';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1500);
}

// ─── INIT ────────────────────────────────────────────────
buildWorld();
