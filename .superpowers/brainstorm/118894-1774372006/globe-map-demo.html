<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DevBrain — Globe Map</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #060810;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; padding: 20px 0 40px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.demo-label {
  color: #4b5263; font-size: 11px; margin-bottom: 12px;
  text-align: center; line-height: 1.6;
}
.demo-label strong { color: #636d83; }

/* PHONE */
.phone {
  width: 340px; height: 720px;
  background: #04060c; border-radius: 44px;
  border: 2px solid #2c313a;
  box-shadow: 0 0 0 1px #1a1e28, 0 30px 80px rgba(0,0,0,0.9);
  overflow: hidden; position: relative;
  display: flex; flex-direction: column;
}

/* HEADER */
.map-header {
  padding: 16px 18px 10px;
  display: flex; justify-content: space-between; align-items: flex-end;
  flex-shrink: 0; position: relative; z-index: 10;
  background: linear-gradient(to bottom, rgba(4,6,12,0.98), transparent);
}
.hdr-title { font-size: 16px; font-weight: 700; color: #e5e9f0; }
.hdr-sub   { font-size: 10px; color: #4b5263; }
.hdr-zoom-hint {
  font-size: 9px; color: #3e4451;
  background: #111620; border: 1px solid #1a1e28;
  border-radius: 6px; padding: 3px 8px;
}

/* GLOBE WRAPPER */
.globe-wrap {
  flex: 1; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 45% 40%, #0a1020 0%, #04060c 70%);
}

/* STARS */
.star-bg { position: absolute; inset: 0; pointer-events: none; }
.st {
  position: absolute; background: #fff; border-radius: 50%;
  animation: tw var(--d,3s) ease-in-out infinite var(--dl,0s);
}
@keyframes tw { 0%,100%{opacity:var(--lo,.1)} 50%{opacity:var(--hi,.4)} }

/* GLOBE SVG */
#globe-svg {
  width: 310px; height: 310px;
  overflow: visible;
  touch-action: none;
  cursor: grab;
}
#globe-svg:active { cursor: grabbing; }

/* ATMOSPHERE OVERLAY */
.atmosphere {
  position: absolute;
  width: 310px; height: 310px;
  border-radius: 50%;
  background: radial-gradient(ellipse at center,
    transparent 60%,
    rgba(70,140,220,0.04) 72%,
    rgba(70,140,220,0.12) 82%,
    rgba(60,120,200,0.28) 91%,
    rgba(50,100,180,0.55) 96%,
    rgba(40,80,160,0.85) 100%);
  pointer-events: none;
  box-shadow: 0 0 40px rgba(60,120,220,0.3), 0 0 80px rgba(40,80,160,0.15);
}

/* LOD transitions */
.subcat-region { transition: opacity 0.4s ease; }
.concept-node  { transition: opacity 0.4s ease; }
.zone-label    { transition: opacity 0.3s ease; }
.subcat-label  { transition: opacity 0.3s ease; }

/* Concept node glow pulse */
.c-done { animation: cglow 2.8s ease-in-out infinite; }
@keyframes cglow {
  0%,100% { filter: drop-shadow(0 0 2px var(--nc)) drop-shadow(0 0 5px var(--nc2)); }
  50%      { filter: drop-shadow(0 0 5px var(--nc)) drop-shadow(0 0 12px var(--nc2)); }
}

/* BOTTOM NAV */
.bnav {
  display: flex; justify-content: space-around; align-items: center;
  border-top: 1px solid #1a1e28; padding: 10px 0 14px;
  background: rgba(4,6,12,0.97); backdrop-filter: blur(16px);
  flex-shrink: 0; z-index: 10;
}
.ni {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  font-size: 9px; color: #3e4451; cursor: pointer;
  padding: 5px 14px; border-radius: 10px; user-select: none;
}
.ni.active { color: #61afef; background: rgba(97,175,239,0.1); }
.ni svg { display: block; }

/* BOTTOM SHEET */
.sheet-backdrop {
  position: absolute; inset: 0; z-index: 30;
  background: rgba(0,0,0,0); pointer-events: none;
  transition: background 0.3s;
}
.sheet-backdrop.on { background: rgba(0,0,0,0.6); pointer-events: all; }
.bottom-sheet {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: #0d1018; border: 1px solid #2c313a; border-bottom: none;
  border-radius: 20px 20px 0 0; padding: 0 18px 22px;
  z-index: 40; transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
}
.bottom-sheet.on { transform: translateY(0); }
.bs-handle { width: 36px; height: 3px; background: #3e4451; border-radius: 2px; margin: 12px auto 14px; }
.bs-tag   { display: inline-block; font-size: 9px; padding: 2px 8px; border-radius: 10px; border: 1px solid; margin-bottom: 6px; }
.bs-name  { font-size: 17px; font-weight: 700; color: #e5e9f0; margin-bottom: 4px; }
.bs-zone  { font-size: 10px; color: #4b5263; margin-bottom: 12px; }
.bs-def   {
  background: #131720; border: 1px solid #1a1e28; border-radius: 10px;
  padding: 10px 12px; margin-bottom: 12px;
  font-size: 11px; color: #8b9199; line-height: 1.6;
}
.bs-quiz {
  background: rgba(97,175,239,0.12); border: 1px solid rgba(97,175,239,0.3);
  border-radius: 10px; padding: 10px; text-align: center;
  font-size: 12px; font-weight: 700; color: #61afef; cursor: pointer;
}

/* ZOOM CONTROLS (desktop helper) */
.zoom-controls {
  position: absolute; right: 12px; bottom: 72px; z-index: 15;
  display: flex; flex-direction: column; gap: 4px;
}
.zc-btn {
  width: 28px; height: 28px; background: rgba(30,34,39,0.9);
  border: 1px solid #2c313a; border-radius: 7px;
  color: #636d83; font-size: 16px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; user-select: none; transition: background 0.15s;
}
.zc-btn:active { background: #2c313a; }

/* LOD indicator */
.lod-badge {
  position: absolute; left: 12px; bottom: 72px; z-index: 15;
  background: rgba(13,15,20,0.85); border: 1px solid #1a1e28;
  border-radius: 8px; padding: 5px 9px;
  font-size: 9px; color: #4b5263;
}
.lod-badge strong { color: #61afef; }
</style>
</head>

</div>

// Cross-zone bridge connections (shown at zone level)
const BRIDGES = [
  {from:'shell', fc:[148,198], to:'web',      tc:[362,198], label:'stdin/stdout'},
  {from:'shell', fc:[72,310],  to:'packages', tc:[88,335],  label:'env var'},
  {from:'git',   fc:[338,82],  to:'editor',   tc:[268,188], label:'version control'},
  {from:'web',   fc:[418,248], to:'ai',       tc:[388,368], label:'API calls'},
  {from:'packages',fc:[148,375],to:'cloud',   tc:[272,405], label:'dependencies'},
  {from:'editor',  fc:[285,242],to:'git',     tc:[302,92],  label:'code changes'},
  {from:'machine', fc:[188,150],to:'shell',   tc:[98,205],  label:'OS + commands'},
];

// ═══════════════════════════════════════════════════════════
// SMOOTH BLOB PATH (Catmull-Rom spline)
// ═══════════════════════════════════════════════════════════
function blobPath(pts) {
  const n = pts.length;
  let d = `M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
  for (let i = 0; i < n; i++) {
    const p0 = pts[(i-1+n)%n], p1 = pts[i];
    const p2 = pts[(i+1)%n],   p3 = pts[(i+2)%n];
    const cp1x = p1[0] + (p2[0]-p0[0])/5;
    const cp1y = p1[1] + (p2[1]-p0[1])/5;
    const cp2x = p2[0] - (p3[0]-p1[0])/5;
    const cp2y = p2[1] - (p3[1]-p1[1])/5;
    d += ` C ${cp1x.toFixed(1)} ${cp1y.toFixed(1)} ${cp2x.toFixed(1)} ${cp2y.toFixed(1)} ${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;
  }
  return d + ' Z';
}

// ═══════════════════════════════════════════════════════════
// STARS
// ═══════════════════════════════════════════════════════════
function makeStars() {
  const bg = document.getElementById('star-bg');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'st';
    const sz = Math.random() < 0.65 ? 1 : (Math.random() < 0.6 ? 1.5 : 2);
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${(Math.random()*100).toFixed(1)}%;top:${(Math.random()*100).toFixed(1)}%;--d:${(2+Math.random()*4).toFixed(1)}s;--dl:-${(Math.random()*6).toFixed(1)}s;--lo:${(0.06+Math.random()*0.14).toFixed(2)};--hi:${(0.25+Math.random()*0.4).toFixed(2)};`;
    bg.appendChild(s);
  }
}

// ═══════════════════════════════════════════════════════════
// SVG HELPERS
// ═══════════════════════════════════════════════════════════
const SVG_NS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs) {
  const el = document.createElementNS(SVG_NS, tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
  return el;
}

// ═══════════════════════════════════════════════════════════
// BUILD GLOBE CONTENT
// ═══════════════════════════════════════════════════════════
function buildGlobe() {
  const g = document.getElementById('globe-g');
  const defs = document.querySelector('#globe-svg defs');

  // LAYER 0: subtle grid lines (graticules)
  const grid = svgEl('g', {class:'grid-lines', opacity:'0.04'});
  for(let lat=0; lat<360; lat+=30){
    const r = lat*218/360;
    grid.appendChild(svgEl('circle',{cx:250,cy:250,r:r,fill:'none',stroke:'#61afef','stroke-width':'0.5'}));
  }
  for(let lon=0; lon<12; lon++){
    const angle = lon*30 * Math.PI/180;
    const x1=250+218*Math.cos(angle), y1=250+218*Math.sin(angle);
    const x2=250-218*Math.cos(angle), y2=250-218*Math.sin(angle);
    grid.appendChild(svgEl('line',{x1,y1,x2,y2,stroke:'#61afef','stroke-width':'0.5'}));
  }
  g.appendChild(grid);

  // LAYER 1: bridge connection lines (zone level, always visible but faint)
  const bridgeG = svgEl('g', {class:'bridge-lines'});
  BRIDGES.forEach((b,i) => {
    const gradId = `bg-${i}`;
    const zf = ZONES.find(z=>z.id===b.from);
    const zt = ZONES.find(z=>z.id===b.to);
    const grad = svgEl('linearGradient',{id:gradId,gradientUnits:'userSpaceOnUse',
      x1:b.fc[0],y1:b.fc[1],x2:b.tc[0],y2:b.tc[1]});
    const s1 = svgEl('stop',{offset:'0%','stop-color':zf.color});
    const s2 = svgEl('stop',{offset:'100%','stop-color':zt.color});
    grad.appendChild(s1); grad.appendChild(s2); defs.appendChild(grad);

    const line = svgEl('line',{
      x1:b.fc[0],y1:b.fc[1],x2:b.tc[0],y2:b.tc[1],
      stroke:`url(#${gradId})`, 'stroke-width':'1.2',
      'stroke-opacity':'0.35', 'stroke-dasharray':'4,6',
      class:'bridge-line'
    });
    bridgeG.appendChild(line);
  });
  g.appendChild(bridgeG);

  // LAYER 2: zone blobs
  const zoneG = svgEl('g', {class:'zone-blobs'});
  ZONES.forEach(z => {
    const gradId = `zg-${z.id}`;
    const grad = svgEl('radialGradient',{id:gradId,cx:'40%',cy:'35%',r:'65%'});
    const rgb = hexRgb(z.color);
    const s1 = svgEl('stop',{offset:'0%','stop-color':z.color,'stop-opacity':'0.22'});
    const s2 = svgEl('stop',{offset:'100%','stop-color':z.color,'stop-opacity':'0.08'});
    grad.appendChild(s1); grad.appendChild(s2); defs.appendChild(grad);

    const path = svgEl('path',{
      d:blobPath(z.blob),
      fill:`url(#${gradId})`,
      stroke:z.color, 'stroke-width':'1.2', 'stroke-opacity':'0.6',
      class:'zone-blob', 'data-zone':z.id
    });
    zoneG.appendChild(path);
  });
  g.appendChild(zoneG);

  // LAYER 3: zone labels (always visible at low zoom)
  const zoneLblG = svgEl('g', {class:'zone-labels'});
  ZONES.forEach(z => {
    const txt = svgEl('text',{
      x:z.centroid[0], y:z.centroid[1],
      'text-anchor':'middle', 'dominant-baseline':'middle',
      fill:z.color, 'font-size':'9', 'font-weight':'700',
      'font-family':'-apple-system,sans-serif',
      'letter-spacing':'0.05em',
      class:'zone-label', 'data-zone':z.id,
      style:'text-shadow:0 0 8px var(--c);pointer-events:none'
    });
    txt.textContent = z.name;
    txt.style.setProperty('--c', z.glow);
    zoneLblG.appendChild(txt);
  });
  g.appendChild(zoneLblG);

  // LAYER 4: subcategory regions (hidden at low zoom)
  const subcatG = svgEl('g', {class:'subcat-regions', opacity:'0'});
  ZONES.forEach(z => {
    z.subcats.forEach(sc => {
      const circle = svgEl('circle',{
        cx:sc.cx, cy:sc.cy, r:sc.r,
        fill:z.color, 'fill-opacity':'0.08',
        stroke:z.color, 'stroke-width':'0.8', 'stroke-opacity':'0.3',
        'stroke-dasharray':'3,3',
        class:'subcat-region'
      });
      subcatG.appendChild(circle);

      const lbl = svgEl('text',{
        x:sc.cx, y:sc.cy - sc.r - 4,
        'text-anchor':'middle', fill:z.color,
        'font-size':'6.5', 'font-weight':'600',
        'font-family':'-apple-system,sans-serif',
        'letter-spacing':'0.06em',
        class:'subcat-label',
        style:'pointer-events:none;opacity:0.7'
      });
      lbl.textContent = sc.name.toUpperCase();
      subcatG.appendChild(lbl);
    });
  });
  g.appendChild(subcatG);

  // LAYER 5: concept-level connection lines (hidden at low zoom)
  const conceptLineG = svgEl('g', {class:'concept-lines', opacity:'0'});
  ZONES.forEach(z => {
    const concepts = z.concepts;
    // connect sequential concepts within zone
    for(let i=0; i<concepts.length-1; i++){
      const a=concepts[i], b=concepts[i+1];
      const line = svgEl('line',{
        x1:a.x,y1:a.y,x2:b.x,y2:b.y,
        stroke:z.color,'stroke-width':'0.7','stroke-opacity':'0.3',
        class:'concept-line'
      });
      conceptLineG.appendChild(line);
    }
  });
  g.appendChild(conceptLineG);

  // LAYER 6: concept nodes (hidden at low zoom)
  const conceptG = svgEl('g', {class:'concept-nodes', opacity:'0'});
  ZONES.forEach(z => {
    z.concepts.forEach(c => {
      const isDone   = c.state==='done';
      const isReview = c.state==='review';
      const isNew    = c.state==='new';
      const isLocked = c.state==='locked';

      // glow filter id
      const filtId = `gf-${z.id}-${c.name.replace(/[^a-z0-9]/gi,'_')}`;
      if(isDone||isReview){
        const filt = svgEl('filter',{id:filtId,x:'-100%',y:'-100%',width:'300%',height:'300%'});
        const fe = svgEl('feGaussianBlur',{in:'SourceGraphic',stdDeviation:isDone?'2.5':'1.5'});
        filt.appendChild(fe); defs.appendChild(filt);
      }

      const nodeG = svgEl('g',{
        class:`concept-node${isDone?' c-done':''}`,
        transform:`translate(${c.x},${c.y})`,
        style:`--nc:${z.glow};--nc2:${z.glow2};cursor:${isLocked?'default':'pointer'}`,
        'data-name':c.name, 'data-zone':z.name, 'data-def':c.def||'',
        'data-color':z.color, 'data-locked':isLocked?'1':'0'
      });

      // glow halo
      if(isDone||isReview){
        const halo = svgEl('circle',{r:isDone?5:3.5,
          fill:z.color, 'fill-opacity':isDone?'0.2':'0.1',
          filter:`url(#${filtId})`});
        nodeG.appendChild(halo);
      }

      const sz = isDone?4.5 : isReview?3.5 : isNew?3 : 2.5;
      const dot = svgEl('circle',{r:sz,
        fill: isDone?z.color : isLocked?'#1a1e28':'none',
        stroke: isLocked?'#2c313a':z.color,
        'stroke-width': isLocked?'0.6':'1',
        'stroke-opacity': isLocked?'0.4':'0.8',
        'fill-opacity': isDone?'0.9':'0'
      });
      nodeG.appendChild(dot);

      // bridge diamond overlay
      if(c.bridge){
        const bz1 = ZONES.find(z2=>z2.id===c.bz[0]);
        const bz2 = ZONES.find(z2=>z2.id===c.bz[1]);
        const bgId = `nbg-${c.name.replace(/[^a-z0-9]/gi,'_')}`;
        const bg = svgEl('linearGradient',{id:bgId,'gradientUnits':'userSpaceOnUse',x1:-4,y1:-4,x2:4,y2:4});
        const bs1=svgEl('stop',{offset:'0%','stop-color':bz1?.color||z.color});
        const bs2=svgEl('stop',{offset:'100%','stop-color':bz2?.color||'#61afef'});
        bg.appendChild(bs1);bg.appendChild(bs2);defs.appendChild(bg);
        const dia = svgEl('rect',{x:-3.5,y:-3.5,width:7,height:7,
          transform:'rotate(45)',fill:'none',
          stroke:`url(#${bgId})`,'stroke-width':'1'});
        nodeG.appendChild(dia);
      }

      // label
      const lbl = svgEl('text',{
        x:0, y:sz+8, 'text-anchor':'middle',
        fill: isLocked?'#2c313a':z.color,
        'font-size':'5.5','font-family':'-apple-system,sans-serif',
        'pointer-events':'none', 'font-weight':'500'
      });
      lbl.textContent = c.name;
      nodeG.appendChild(lbl);

      if(!isLocked){
        nodeG.addEventListener('click', e => {
          e.stopPropagation();
          openSheet(c, z);
        });
      }
      conceptG.appendChild(nodeG);
    });
  });
  g.appendChild(conceptG);
}

// ═══════════════════════════════════════════════════════════
// D3 ZOOM
// ═══════════════════════════════════════════════════════════
const svg  = d3.select('#globe-svg');
const gEl  = d3.select('#globe-g');
let currentK = 1;

const zoom = d3.zoom()
  .scaleExtent([0.5, 12])
  .on('zoom', event => {
    const t = event.transform;
    gEl.attr('transform', t);
    currentK = t.k;
    updateLOD(t.k);
  });

svg.call(zoom);

// Prevent double-click default zoom
svg.on('dblclick.zoom', null);

// Double-tap to zoom in on a zone
svg.on('dblclick', event => {
  const [mx,my] = d3.pointer(event, document.getElementById('globe-g'));
  svg.transition().duration(500).call(
    zoom.scaleBy, 2.5,
    [mx * (310/500) + (340-310)/2, my * (310/500) + 70]
  );
});

function updateLOD(k) {
  // Zone blobs: fade slightly at high zoom
  d3.selectAll('.zone-blob').style('opacity', k < 4 ? 1 : Math.max(0.4, 1-(k-4)*0.1));
  // Zone labels: fade out above k=3
  d3.selectAll('.zone-label').style('opacity', k < 2 ? 1 : Math.max(0, 1-(k-2)/1.5));
  // Bridge lines: fade out above k=2
  d3.selectAll('.bridge-line').style('opacity', k < 1.5 ? 0.35 : Math.max(0, 0.35-(k-1.5)*0.15));
  // Grid: fade at high zoom
  d3.selectAll('.grid-lines').style('opacity', k < 3 ? 0.04 : Math.min(0.1, 0.04+(k-3)*0.02));

  // Subcategory regions: emerge k > 1.8
  const subcatOp = k < 1.8 ? 0 : Math.min(1, (k-1.8)/1.2);
  d3.selectAll('.subcat-regions').style('opacity', subcatOp);

  // Concept lines: emerge k > 3.5
  const clineOp = k < 3.5 ? 0 : Math.min(1, (k-3.5)/1.5);
  d3.selectAll('.concept-lines').style('opacity', clineOp);

  // Concept nodes: emerge k > 3
  const cnodeOp = k < 3 ? 0 : Math.min(1, (k-3)/1.8);
  d3.selectAll('.concept-nodes').style('opacity', cnodeOp);

  // LOD badge + header text
  const badge = document.getElementById('lod-badge');
  const lodTxt = document.getElementById('lod-text');
  const kLabel = badge.querySelector('strong');
  if(kLabel) kLabel.textContent = '×'+k.toFixed(1);
  if(k < 1.8){
    badge.lastChild.textContent = ' zones';
    lodTxt.textContent = 'Zoomed out — all 8 zones visible';
  } else if(k < 3){
    badge.lastChild.textContent = ' subcategories';
    lodTxt.textContent = 'Subcategories visible — zoom in more';
  } else {
    badge.lastChild.textContent = ' concepts';
    lodTxt.textContent = 'Concepts visible — tap a glowing node';
  }
}

// ═══════════════════════════════════════════════════════════
// ZOOM CONTROLS
// ═══════════════════════════════════════════════════════════
document.getElementById('btn-zoom-in').addEventListener('click', () => {
  svg.transition().duration(300).call(zoom.scaleBy, 1.8);
});
document.getElementById('btn-zoom-out').addEventListener('click', () => {
  svg.transition().duration(300).call(zoom.scaleBy, 0.6);
});
document.getElementById('btn-reset').addEventListener('click', () => {
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
});

// ═══════════════════════════════════════════════════════════
// BOTTOM SHEET
// ═══════════════════════════════════════════════════════════
function openSheet(c, z) {
  const tag  = document.getElementById('bs-tag');
  const nm   = document.getElementById('bs-name');
  const zone = document.getElementById('bs-zone');
  const def  = document.getElementById('bs-def');

  tag.textContent = z.name;
  tag.style.color = z.color;
  tag.style.borderColor = z.color;
  tag.style.background  = `rgba(${hexRgb(z.color).join(',')},0.1)`;
  nm.textContent   = c.name;
  zone.textContent = z.name + ' · ' + (z.subcats[0]?.name || '');
  def.textContent  = c.def || 'Definition coming soon.';

  document.getElementById('sheet-bg').classList.add('on');
  document.getElementById('sheet').classList.add('on');
}
function closeSheet() {
  document.getElementById('sheet-bg').classList.remove('on');
  document.getElementById('sheet').classList.remove('on');
}

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
function hexRgb(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
makeStars();
buildGlobe();

// Set lod-badge text node properly
const badge = document.getElementById('lod-badge');
badge.appendChild(document.createTextNode(' zones'));
</script>
