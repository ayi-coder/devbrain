<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#282c34">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>DevBrain</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/theme.css">
</head>
<body>
  <div id="app">
    <div id="view-home" class="view"></div>
    <div id="view-concepts" class="view"></div>
    <div id="view-learn" class="view"></div>
    <div id="view-quiz" class="view"></div>
    <div id="view-results" class="view"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-tab" data-view="home" onclick="location.hash='#home'">
      <span style="font-size:20px;">🏠</span>
      <span>Home</span>
    </button>
    <button class="nav-tab" data-view="concepts" onclick="location.hash='#concepts'">
      <span style="font-size:20px;">🗺️</span>
      <span>Concepts</span>
    </button>
    <button class="nav-tab" data-view="progress" onclick="location.hash='#home'">
      <span style="font-size:20px;">📊</span>
      <span>Progress</span>
    </button>
  </nav>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
