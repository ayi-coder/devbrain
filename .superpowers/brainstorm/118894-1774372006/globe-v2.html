<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DevBrain — Globe v2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #03050a;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; padding: 16px 0 32px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.hint { color: #3e4451; font-size: 10px; margin-bottom: 12px; letter-spacing: 0.04em; }

/* ── PHONE ── */
.phone {
  width: 340px; height: 720px;
  background: #02040a;
  border-radius: 44px;
  border: 2px solid #1e2330;
  box-shadow: 0 0 0 1px #0e1018, 0 24px 80px rgba(0,0,0,0.95),
              inset 0 0 60px rgba(97,175,239,0.01);
  overflow: hidden; position: relative;
  display: flex; flex-direction: column;
}

/* ── HEADER ── */
.hdr {
  padding: 18px 18px 8px; flex-shrink: 0;
  display: flex; justify-content: space-between; align-items: flex-end;
  position: relative; z-index: 10;
}
.hdr-left h1 { font-size: 16px; font-weight: 700; color: #e5e9f0; letter-spacing: -0.01em; }
.hdr-left p  { font-size: 9px; color: #3e4451; margin-top: 2px; }
.hdr-zoom {
  font-size: 8px; color: #2c313a; background: #0d1018;
  border: 1px solid #1a1e28; border-radius: 6px; padding: 3px 8px;
}

/* ── GLOBE AREA ── */
.globe-area {
  flex: 1; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}

/* deep space bg */
.space-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 70% at 50% 40%,
    #06091a 0%, #03050e 55%, #02040a 100%);
}

/* star field */
.stars { position: absolute; inset: 0; pointer-events: none; }
.st {
  position: absolute; border-radius: 50%; background: #fff;
  animation: tw var(--d,3s) ease-in-out infinite var(--dl,0s);
}
@keyframes tw { 0%,100%{opacity:var(--lo,.05)} 50%{opacity:var(--hi,.3)} }

/* canvas */
#c {
  position: relative; z-index: 2;
  touch-action: none; cursor: grab; display: block;
}
#c:active { cursor: grabbing; }

/* atmosphere */
.atmo {
  position: absolute; z-index: 3; pointer-events: none;
  border-radius: 50%;
  box-shadow:
    0 0 0 2px rgba(50,100,200,0.12),
    0 0 20px rgba(60,120,220,0.2),
    0 0 50px rgba(40,80,180,0.12),
    0 0 100px rgba(30,60,160,0.06);
}
.atmo::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  background: radial-gradient(ellipse at center,
    transparent 58%,
    rgba(50,100,200,0.03) 68%,
    rgba(50,100,200,0.09) 80%,
    rgba(40,90,190,0.22) 90%,
    rgba(35,75,175,0.50) 97%,
    rgba(25,55,155,0.80) 100%);
}

/* ── ZOOM RING ── */
.zoom-ring {
  position: absolute; bottom: 70px; right: 12px; z-index: 10;
  display: flex; flex-direction: column; gap: 4px;
}
.zr-btn {
  width: 26px; height: 26px;
  background: rgba(15,20,30,0.9); border: 1px solid #1e2330;
  border-radius: 7px; color: #4b5263; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; user-select: none;
  transition: border-color 0.15s, color 0.15s;
}
.zr-btn:active { border-color: #61afef; color: #61afef; }

/* ── LOD CHIP ── */
.lod-chip {
  position: absolute; bottom: 70px; left: 12px; z-index: 10;
  background: rgba(13,16,24,0.85); border: 1px solid #1a1e28;
  border-radius: 8px; padding: 5px 10px;
  font-size: 8px; color: #3e4451;
}
.lod-chip strong { color: #61afef; }

/* ── BOTTOM SHEET ── */
.backdrop {
  position: absolute; inset: 0; z-index: 20;
  background: rgba(0,0,0,0); pointer-events: none;
  transition: background 0.3s;
}
.backdrop.on { background: rgba(0,0,0,0.65); pointer-events: all; }

.sheet {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: #0a0d14; border: 1px solid #1e2330; border-bottom: none;
  border-radius: 22px 22px 0 0; padding: 0 18px 24px;
  z-index: 30; transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
}
.sheet.on { transform: translateY(0); }

.sh-handle { width: 36px; height: 3px; background: #2c313a; border-radius: 2px; margin: 12px auto 16px; }
.sh-top  { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.sh-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.sh-name { font-size: 17px; font-weight: 700; color: #e5e9f0; }
.sh-sub  { font-size: 10px; color: #4b5263; margin-bottom: 14px; }
.sh-stats {
  display: flex; gap: 10px; margin-bottom: 14px;
}
.sh-stat {
  flex: 1; background: #0f1320; border: 1px solid #1a1e28;
  border-radius: 10px; padding: 10px;
}
.sh-stat-n { font-size: 18px; font-weight: 800; color: #e5e9f0; line-height: 1; }
.sh-stat-l { font-size: 8px; color: #4b5263; margin-top: 3px; }
.sh-bar-wrap { height: 2px; background: #1a1e28; border-radius: 1px; overflow: hidden; margin-top: 6px; }
.sh-bar { height: 100%; border-radius: 1px; }
.sh-subcats { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
.sh-sc {
  font-size: 9px; padding: 3px 9px; border-radius: 6px;
  border: 1px solid; color: inherit;
}
.sh-cta {
  background: rgba(97,175,239,0.12);
  border: 1px solid rgba(97,175,239,0.3);
  border-radius: 11px; padding: 11px;
  text-align: center; font-size: 12px; font-weight: 700;
  color: #61afef; cursor: pointer;
}

/* ── BOTTOM NAV ── */
.bnav {
  display: flex; justify-content: space-around; align-items: center;
  border-top: 1px solid #111520; padding: 10px 0 14px;
  background: rgba(2,4,10,0.97); backdrop-filter: blur(20px);
  flex-shrink: 0; z-index: 10;
}
.ni {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  font-size: 9px; color: #2c313a; padding: 5px 14px;
  border-radius: 10px; cursor: pointer; user-select: none;
}
.ni.active { color: #61afef; background: rgba(97,175,239,0.08); }
.ni svg { display: block; }
</style>
</head>
<body>
<p class="hint">Drag to rotate · Scroll or pinch to zoom · Tap a zone</p>

<div class="phone">
  <div class="hdr">
    <div class="hdr-left">
      <h1>Map</h1>
      <p id="lod-text">Rotating — all zones visible</p>
    </div>
    <div class="hdr-zoom">Drag to rotate</div>
  </div>

  <div class="globe-area">
    <div class="space-bg"></div>
    <div class="stars" id="stars"></div>
    <canvas id="c"></canvas>
    <div class="atmo" id="atmo"></div>

    <div class="zoom-ring">
      <div class="zr-btn" id="zi">+</div>
      <div class="zr-btn" id="zo">−</div>
      <div class="zr-btn" id="zr" style="font-size:10px">⌂</div>
    </div>
    <div class="lod-chip" id="lod-chip"><strong>×1.0</strong></div>
  </div>

  <div class="backdrop" id="bk" onclick="closeSheet()"></div>
  <div class="sheet" id="sh">
    <div class="sh-handle"></div>
    <div class="sh-top">
      <div class="sh-dot" id="sh-dot"></div>
      <div class="sh-name" id="sh-name">Zone</div>
    </div>
    <div class="sh-sub" id="sh-sub"></div>
    <div class="sh-stats">
      <div class="sh-stat">
        <div class="sh-stat-n" id="sh-explored">0</div>
        <div class="sh-stat-l">explored</div>
        <div class="sh-bar-wrap"><div class="sh-bar" id="sh-bar"></div></div>
      </div>
      <div class="sh-stat">
        <div class="sh-stat-n" id="sh-total">0</div>
        <div class="sh-stat-l">total concepts</div>
      </div>
    </div>
    <div class="sh-subcats" id="sh-subcats"></div>
    <div class="sh-cta" onclick="closeSheet()">Explore on Globe →</div>
  </div>

  <div class="bnav">
    <div class="ni"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg><span>Home</span></div>
    <div class="ni"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/></svg><span>Curriculum</span></div>
    <div class="ni active"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="1,6 1,22 8,18 16,22 23,18 23,2 16,6 8,2"/></svg><span>Map</span></div>
  </div>
</div>

<!-- D3 v7 -->
<script src="https://d3js.org/d3.v7.min.js"></script>
<script type="module">
// ═══════════════════════════════════════════════════════════════
// Import d3-geo-voronoi via ESM (skypack resolves all deps)
// ═══════════════════════════════════════════════════════════════
import { geoVoronoi } from 'https://cdn.skypack.dev/d3-geo-voronoi@2';

// ═══════════════════════════════════════════════════════════════
// VERSOR (inline — quaternion-based globe rotation, no gimbal lock)
// Based on https://github.com/d3/versor by Mike Bostock
// ═══════════════════════════════════════════════════════════════
const versor = (() => {
  const cr = x => x * Math.PI / 180;
  function cross(a, b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
  function dot(a, b)   { return a[0]*b[0] + a[1]*b[1] + a[2]*b[2]; }
  function cartesian([l, p]) {
    l = cr(l); p = cr(p);
    const cp = Math.cos(p);
    return [cp * Math.cos(l), cp * Math.sin(l), Math.sin(p)];
  }
  function rotation([a, b, c, d]) {
    return [
      Math.atan2(2*(a*b + c*d), 1 - 2*(b*b + c*c)) / cr(1),
      Math.asin(Math.max(-1, Math.min(1, 2*(a*c - d*b)))) / cr(1),
      Math.atan2(2*(a*d + b*c), 1 - 2*(c*c + d*d)) / cr(1)
    ];
  }
  function delta(v0, v1) {
    const w = cross(v0, v1), l = Math.sqrt(dot(w, w));
    if (!l) return [1, 0, 0, 0];
    const t = Math.atan2(l, dot(v0, v1)) / 2, s = Math.sin(t);
    return [Math.cos(t), w[0]/l*s, w[1]/l*s, w[2]/l*s];
  }
  function multiply([a0,b0,c0,d0], [a1,b1,c1,d1]) {
    return [a0*a1-b0*b1-c0*c1-d0*d1, a0*b1+b0*a1+c0*d1-d0*c1,
            a0*c1-b0*d1+c0*a1+d0*b1, a0*d1+b0*c1-c0*b1+d0*a1];
  }
  function fromRot([l, p, g = 0]) {
    l=cr(l/2); p=cr(p/2); g=cr(g/2);
    const sl=Math.sin(l),cl=Math.cos(l),sp=Math.sin(p),cp=Math.cos(p),sg=Math.sin(g),cg=Math.cos(g);
    return [cl*cp*cg+sl*sp*sg, sl*cp*cg-cl*sp*sg, cl*sp*cg+sl*cp*sg, cl*cp*sg-sl*sp*cg];
  }
  return { cartesian, rotation, delta, multiply, fromRot };
})();

// ═══════════════════════════════════════════════════════════════
// ZONE DATA
// ═══════════════════════════════════════════════════════════════
const ZONES = [
  { id:'machine',  name:'Your Machine',     color:'#c678dd', lon:-110, lat: 50,  explored: 3, total:14,
    subcats:['Operating Systems','File System','System Concepts'] },
  { id:'git',      name:'Git & GitHub',     color:'#e06c75', lon:  15, lat: 52,  explored: 5, total:15,
    subcats:['Core Concepts','Git Commands','GitHub'] },
  { id:'shell',    name:'Shell & Terminal', color:'#e5c07b', lon: -65, lat: -8,  explored: 8, total:18,
    subcats:['Core Concepts','Bash Commands','PowerShell','Scripting'] },
  { id:'web',      name:'The Web',          color:'#61afef', lon:  22, lat:  2,  explored: 2, total:16,
    subcats:['How the Web Works','APIs & Data','Security'] },
  { id:'editor',   name:'Editor & Code',    color:'#98c379', lon:  78, lat: 28,  explored: 0, total:14,
    subcats:['VS Code','Code Fundamentals','Software Concepts'] },
  { id:'packages', name:'Packages & Env',   color:'#56b6c2', lon: 135, lat:-28,  explored: 0, total:13,
    subcats:['Package Managers','Project Config','Dependencies'] },
  { id:'ai',       name:'AI & Prompting',   color:'#d19a66', lon: 118, lat: 32,  explored: 0, total:15,
    subcats:['How AI Works','Using AI Tools','Prompting'] },
  { id:'cloud',    name:'Cloud & Deploy',   color:'#abb2bf', lon:  -5, lat:-58,  explored: 0, total:15,
    subcats:['Deployment','Databases','Storage'] },
];

// bridge connections between zones (great-circle arcs on surface)
const BRIDGES = [
  ['machine','shell'],['machine','git'],
  ['shell','web'],['shell','packages'],
  ['git','editor'],['git','web'],
  ['web','ai'],['packages','cloud'],
  ['editor','ai'],['cloud','packages'],
];

// ═══════════════════════════════════════════════════════════════
// CANVAS + PROJECTION SETUP
// ═══════════════════════════════════════════════════════════════
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');

// Size: fit within phone globe area
const SIZE = 270;
const CX = SIZE / 2, CY = SIZE / 2;
const BASE_RADIUS = 126;
canvas.width  = SIZE;
canvas.height = SIZE;

// Position atmosphere overlay to match canvas
const atmoEl = document.getElementById('atmo');
atmoEl.style.width  = SIZE + 'px';
atmoEl.style.height = SIZE + 'px';

let globeRadius = BASE_RADIUS;
let zoomK = 1;

const projection = d3.geoOrthographic()
  .scale(globeRadius)
  .translate([CX, CY])
  .clipAngle(90)
  .precision(0.2);

const pathGen = d3.geoPath(projection, ctx);
const graticule = d3.geoGraticule()();

// ═══════════════════════════════════════════════════════════════
// VORONOI PANELS
// ═══════════════════════════════════════════════════════════════
const seeds = ZONES.map(z => [z.lon, z.lat]);
const voro  = geoVoronoi(seeds);
const cells = voro.polygons();

// Attach zone data to each cell
cells.features.forEach(f => {
  // d3-geo-voronoi stores site index in properties
  const idx = f.properties.sitecoordinates
    ? ZONES.findIndex(z => z.lon === f.properties.sitecoordinates[0])
    : seeds.findIndex(s => s[0] === f.properties.site[0]);
  f.zone = ZONES[idx] ?? ZONES[0];
});

// Precompute centroids
cells.features.forEach(f => {
  f.centroid = d3.geoCentroid(f);
});

// ═══════════════════════════════════════════════════════════════
// STARS
// ═══════════════════════════════════════════════════════════════
(function makeStars() {
  const el = document.getElementById('stars');
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'st';
    const sz = Math.random() < 0.6 ? 1 : Math.random() < 0.6 ? 1.5 : 2;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${(Math.random()*100).toFixed(1)}%;top:${(Math.random()*100).toFixed(1)}%;--d:${(2+Math.random()*5).toFixed(1)}s;--dl:-${(Math.random()*7).toFixed(1)}s;--lo:${(0.04+Math.random()*0.1).toFixed(2)};--hi:${(0.2+Math.random()*0.4).toFixed(2)};`;
    el.appendChild(s);
  }
})();

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16),
        g = parseInt(hex.slice(3,5),16),
        b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function zoneGlow(z, a) {
  const r = parseInt(z.color.slice(1,3),16),
        g = parseInt(z.color.slice(3,5),16),
        b = parseInt(z.color.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// Is a [lon,lat] point on the visible hemisphere?
function isVisible([lon, lat]) {
  const rot = projection.rotate();
  const dLon = (lon + rot[0]) * Math.PI / 180;
  const dLat = (lat + rot[1]) * Math.PI / 180;
  return Math.cos(dLat) * Math.cos(dLon) > 0;
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
let highlightedZone = null;

function render() {
  ctx.clearRect(0, 0, SIZE, SIZE);

  // ── Globe base (dark space) ──
  const bg = ctx.createRadialGradient(CX, CY * 0.85, 0, CX, CY, globeRadius);
  bg.addColorStop(0,   '#0d1428');
  bg.addColorStop(0.5, '#070c1a');
  bg.addColorStop(1,   '#030710');
  ctx.beginPath();
  ctx.arc(CX, CY, globeRadius, 0, 2 * Math.PI);
  ctx.fillStyle = bg;
  ctx.fill();

  // ── Graticule (subtle grid) ──
  ctx.save();
  ctx.beginPath();
  pathGen(graticule);
  ctx.strokeStyle = 'rgba(60,100,180,0.08)';
  ctx.lineWidth = 0.4;
  ctx.stroke();
  ctx.restore();

  // ── Bridge arcs (great-circle connections between zones) ──
  BRIDGES.forEach(([a, b]) => {
    const za = ZONES.find(z => z.id === a);
    const zb = ZONES.find(z => z.id === b);
    if (!za || !zb) return;
    const visA = isVisible([za.lon, za.lat]);
    const visB = isVisible([zb.lon, zb.lat]);
    if (!visA && !visB) return;

    ctx.save();
    ctx.beginPath();
    pathGen({ type:'LineString', coordinates:[[za.lon,za.lat],[zb.lon,zb.lat]] });

    // gradient stroke from zone a color to zone b color
    const pA = projection([za.lon, za.lat]);
    const pB = projection([zb.lon, zb.lat]);
    if (pA && pB) {
      const grad = ctx.createLinearGradient(pA[0], pA[1], pB[0], pB[1]);
      grad.addColorStop(0, hexToRgba(za.color, 0.25));
      grad.addColorStop(1, hexToRgba(zb.color, 0.25));
      ctx.strokeStyle = grad;
    } else {
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    }
    ctx.lineWidth = 0.8;
    ctx.setLineDash([3, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  });

  // ── Zone panels ──
  cells.features.forEach(f => {
    const z = f.zone;
    const isHighlighted = highlightedZone === z.id;
    const vis = isVisible(f.centroid || [z.lon, z.lat]);

    ctx.save();
    ctx.beginPath();
    pathGen(f);

    // Fill — holographic glow
    if (z.explored > 0 || isHighlighted) {
      const fillGrad = ctx.createRadialGradient(
        ...(projection([z.lon, z.lat]) || [CX,CY]), globeRadius * 0.02,
        ...(projection([z.lon, z.lat]) || [CX,CY]), globeRadius * 0.55
      );
      fillGrad.addColorStop(0,   hexToRgba(z.color, isHighlighted ? 0.38 : 0.28));
      fillGrad.addColorStop(0.5, hexToRgba(z.color, isHighlighted ? 0.18 : 0.12));
      fillGrad.addColorStop(1,   hexToRgba(z.color, 0.04));
      ctx.fillStyle = fillGrad;
    } else {
      ctx.fillStyle = hexToRgba(z.color, vis ? 0.07 : 0.03);
    }
    ctx.fill();

    // Stroke — panel boundary (the "panel edge" of the sphere)
    ctx.strokeStyle = hexToRgba(z.color, isHighlighted ? 0.9 : (z.explored > 0 ? 0.55 : 0.22));
    ctx.lineWidth   = isHighlighted ? 1.6 : (z.explored > 0 ? 1.0 : 0.5);
    ctx.stroke();
    ctx.restore();
  });

  // ── Explored zone pulse dots (city lights) ──
  ZONES.filter(z => z.explored > 0).forEach(z => {
    if (!isVisible([z.lon, z.lat])) return;
    const pt = projection([z.lon, z.lat]);
    if (!pt) return;

    // outer glow
    const g = ctx.createRadialGradient(pt[0], pt[1], 0, pt[0], pt[1], 12);
    g.addColorStop(0,   hexToRgba(z.color, 0.5));
    g.addColorStop(0.4, hexToRgba(z.color, 0.15));
    g.addColorStop(1,   hexToRgba(z.color, 0));
    ctx.beginPath();
    ctx.arc(pt[0], pt[1], 12, 0, 2*Math.PI);
    ctx.fillStyle = g;
    ctx.fill();

    // center dot
    ctx.beginPath();
    ctx.arc(pt[0], pt[1], 3.5, 0, 2*Math.PI);
    ctx.fillStyle = z.color;
    ctx.fill();
  });

  // ── Zone labels ──
  cells.features.forEach(f => {
    const z = f.zone;
    const c  = f.centroid || [z.lon, z.lat];
    if (!isVisible(c)) return;

    const pt = projection(c);
    if (!pt) return;

    const rot = projection.rotate();
    const dLon = (c[0] + rot[0]) * Math.PI / 180;
    const dLat = (c[1] + rot[1]) * Math.PI / 180;
    const facing = Math.cos(dLat) * Math.cos(dLon); // 0..1 — how face-on

    const alpha = Math.max(0, Math.min(1, (facing - 0.1) / 0.5));
    if (alpha < 0.05) return;

    ctx.save();
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    // name
    ctx.font      = `700 ${zoomK > 2 ? 7 : 8}px -apple-system,sans-serif`;
    ctx.fillStyle = hexToRgba(z.color, alpha * (z.explored > 0 ? 0.95 : 0.6));
    ctx.fillText(z.name, pt[0], pt[1]);

    // progress indicator under name
    if (z.explored > 0 && alpha > 0.5) {
      ctx.font      = `500 6px -apple-system,sans-serif`;
      ctx.fillStyle = hexToRgba(z.color, alpha * 0.5);
      ctx.fillText(`${z.explored}/${z.total}`, pt[0], pt[1] + 11);
    }
    ctx.restore();
  });

  // ── Globe rim clip (circle border) ──
  ctx.save();
  ctx.beginPath();
  ctx.arc(CX, CY, globeRadius, 0, 2*Math.PI);
  ctx.strokeStyle = 'rgba(60,100,200,0.18)';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// AUTO-ROTATION
// ═══════════════════════════════════════════════════════════════
let rotating     = true;
let rotateTimer  = null;
let lastFrame    = 0;
const SPIN_SPEED = 4; // degrees per second

function animate(ts) {
  if (rotating) {
    const dt = (ts - lastFrame) / 1000;
    lastFrame = ts;
    const [l, p, g] = projection.rotate();
    projection.rotate([l + SPIN_SPEED * dt, p, g]);
  }
  render();
  requestAnimationFrame(animate);
}

function stopRotate() {
  rotating = false;
  clearTimeout(rotateTimer);
}

function resumeRotate(delay = 3000) {
  clearTimeout(rotateTimer);
  rotateTimer = setTimeout(() => {
    rotating = true;
    lastFrame = performance.now();
  }, delay);
}

// ═══════════════════════════════════════════════════════════════
// DRAG (versor)
// ═══════════════════════════════════════════════════════════════
let v0 = null, q0, r0;
let dragStart = null;
let isDrag = false;

canvas.addEventListener('pointerdown', e => {
  stopRotate();
  isDrag = false;
  dragStart = { x: e.offsetX, y: e.offsetY };
  const inv = projection.invert([e.offsetX, e.offsetY]);
  if (!inv) return;
  v0 = versor.cartesian(inv);
  q0 = versor.fromRot(r0 = projection.rotate());
  canvas.setPointerCapture(e.pointerId);
});

canvas.addEventListener('pointermove', e => {
  if (!v0 || !dragStart) return;
  const dx = e.offsetX - dragStart.x, dy = e.offsetY - dragStart.y;
  if (Math.sqrt(dx*dx + dy*dy) > 3) isDrag = true;
  const inv = projection.rotate(r0).invert([e.offsetX, e.offsetY]);
  if (!inv) return;
  const v1    = versor.cartesian(inv);
  const delta = versor.delta(v0, v1);
  projection.rotate(versor.rotation(versor.multiply(q0, delta)));
});

canvas.addEventListener('pointerup', e => {
  if (!isDrag && dragStart) {
    // TAP — find zone
    const inv = projection.invert([e.offsetX, e.offsetY]);
    if (inv) {
      const hit = cells.features.find(f => d3.geoContains(f, inv));
      if (hit) tapZone(hit.zone);
    }
  }
  v0 = null;
  dragStart = null;
  resumeRotate();
});

// Scroll wheel zoom
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.85 : 1.18;
  setZoom(zoomK * delta);
}, { passive: false });

// Pinch zoom
let lastPinchDist = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastPinchDist = Math.sqrt(dx*dx + dy*dy);
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && lastPinchDist) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    setZoom(zoomK * (dist / lastPinchDist));
    lastPinchDist = dist;
  }
}, { passive: true });

canvas.addEventListener('touchend', () => { lastPinchDist = null; });

// ═══════════════════════════════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════════════════════════════
function setZoom(k, smooth = false) {
  zoomK = Math.max(0.6, Math.min(5, k));
  globeRadius = BASE_RADIUS * zoomK;
  projection.scale(globeRadius);

  const chip = document.getElementById('lod-chip');
  const ltxt = document.getElementById('lod-text');
  chip.textContent = '';
  const strong = document.createElement('strong');
  strong.textContent = '×' + zoomK.toFixed(1);
  chip.appendChild(strong);
  chip.appendChild(document.createTextNode(zoomK < 2 ? ' zones' : zoomK < 3.5 ? ' subcats' : ' concepts'));
  ltxt.textContent = zoomK < 2 ? 'Drag to rotate · Tap a zone' : zoomK < 3.5 ? 'Subcategories visible' : 'Concepts visible — tap a node';
}

// Zoom to a zone — rotate globe to face it then scale up
function zoomToZone(zone, targetZoom = 2.8) {
  stopRotate();
  const [lon, lat] = [zone.lon, zone.lat];
  const startRot   = projection.rotate();
  const startZoom  = zoomK;
  const targetRot  = [-lon, -lat, 0];
  const duration   = 700;
  const start      = performance.now();

  function step(now) {
    const t  = Math.min(1, (now - start) / duration);
    const et = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // ease in-out quad
    projection.rotate([
      startRot[0] + (targetRot[0] - startRot[0]) * et,
      startRot[1] + (targetRot[1] - startRot[1]) * et,
      0
    ]);
    setZoom(startZoom + (targetZoom - startZoom) * et);
    render();
    if (t < 1) requestAnimationFrame(step);
    else resumeRotate(5000);
  }
  requestAnimationFrame(step);
}

// ═══════════════════════════════════════════════════════════════
// ZONE TAP + SHEET
// ═══════════════════════════════════════════════════════════════
function tapZone(zone) {
  highlightedZone = zone.id;
  zoomToZone(zone);
  openSheet(zone);
}

function openSheet(zone) {
  document.getElementById('sh-dot').style.background = zone.color;
  document.getElementById('sh-name').textContent = zone.name;
  document.getElementById('sh-sub').textContent = zone.explored + ' of ' + zone.total + ' concepts explored';
  document.getElementById('sh-explored').textContent = zone.explored;
  document.getElementById('sh-explored').style.color = zone.color;
  document.getElementById('sh-total').textContent = zone.total;

  const bar = document.getElementById('sh-bar');
  bar.style.width = (zone.explored / zone.total * 100).toFixed(0) + '%';
  bar.style.background = zone.color;

  const subcatsEl = document.getElementById('sh-subcats');
  while (subcatsEl.firstChild) subcatsEl.removeChild(subcatsEl.firstChild);
  zone.subcats.forEach(sc => {
    const chip = document.createElement('div');
    chip.className = 'sh-sc';
    chip.textContent = sc;
    chip.style.color = zone.color;
    chip.style.borderColor = hexToRgba(zone.color, 0.3);
    chip.style.background  = hexToRgba(zone.color, 0.06);
    subcatsEl.appendChild(chip);
  });

  document.getElementById('bk').classList.add('on');
  document.getElementById('sh').classList.add('on');
}

function closeSheet() {
  document.getElementById('bk').classList.remove('on');
  document.getElementById('sh').classList.remove('on');
  highlightedZone = null;
  resumeRotate(500);
}

// ═══════════════════════════════════════════════════════════════
// ZOOM BUTTONS
// ═══════════════════════════════════════════════════════════════
document.getElementById('zi').addEventListener('click', () => setZoom(zoomK * 1.5));
document.getElementById('zo').addEventListener('click', () => setZoom(zoomK * 0.7));
document.getElementById('zr').addEventListener('click', () => {
  setZoom(1);
  projection.rotate([0, 0, 0]);
  rotating = true;
  lastFrame = performance.now();
});

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
lastFrame = performance.now();
requestAnimationFrame(animate);
</script>
</body>
</html>
